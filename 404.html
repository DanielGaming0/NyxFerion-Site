<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - NyxFerion</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css"> <!-- Link para o seu arquivo CSS -->
    <style>
        /* Estilos específicos para a página 404 */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            color: #ff6b6b;
            animation: float 3s ease-in-out infinite;
        }
        h2 {
            font-size: 2rem;
            margin: 10px 0;
        }
        p {
            font-size: 1.2rem;
            margin: 20px 0;
        }
        a {
            color: #4dabf7;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        .floating-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .floating-icons i {
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>
<body>
    <!-- Conteúdo da página 404 -->
    <div class="container" data-aos="fade-up">
        <h1>404</h1>
        <h2>Página não encontrada</h2>
        <p>A página que você está procurando não existe ou foi movida.</p>
        <p>Você será redirecionado para a <a href="/">página inicial</a> em <span id="countdown">5</span> segundos.</p>
    </div>

    <!-- Ícones flutuantes -->
    <div class="floating-icons">
        <i class="fas fa-cube" style="top: 10%; left: 5%; animation-delay: 0s;"></i>
        <i class="fas fa-dragon" style="top: 20%; left: 80%; animation-delay: 2s;"></i>
        <i class="fas fa-coins" style="top: 50%; left: 10%; animation-delay: 4s;"></i>
        <i class="fas fa-tree" style="top: 70%; left: 70%; animation-delay: 1s;"></i>
        <i class="fas fa-exclamation-triangle" style="top: 90%; left: 50%; animation-delay: 3s;"></i>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inicializa AOS (Animate On Scroll)
        AOS.init({
            duration: 1000,
            once: true
        });

        // Redirecionamento automático e contador
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = "/"; // Redireciona para a página inicial
            }
        }, 1000);
    </script>
</body>
</html>
