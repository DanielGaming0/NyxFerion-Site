<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatura para Administrador - NyxFerion</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Variables */
        :root {
            --primary: #8a2be2; /* Roxo */
            --secondary: #4b0082; /* Roxo escuro */
            --accent: #ff4081; /* Rosa */
            --background: #1a1a1a; /* Fundo escuro */
            --text: #ffffff; /* Texto branco */
            --light-text: #b3b3b3; /* Texto claro */
            --white: #ffffff; /* Branco */
            --gradient: linear-gradient(135deg, #8a2be2 0%, #4b0082 100%); /* Gradiente roxo */
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.3); /* Sombra mais escura */
            --transition: all 0.3s ease;
            --card-bg: #2a2a2a; /* Fundo dos cards */
        }

        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--background);
            overflow-x: hidden;
        }

        /* Form Container */
        .form-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
            animation: fadeIn 1s ease-out;
        }

        .form-container h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--light-text);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--primary);
            border-radius: 10px;
            background: var(--background);
            color: var(--text);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            background: var(--gradient);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Formulário de Candidatura -->
    <div class="form-container" data-aos="fade-up">
        <h1>Candidatar-se a Administrador</h1>
        <form id="apply-form" action="send_email.php" method="POST">
            <div class="form-group">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="age">Idade:</label>
                <input type="number" id="age" name="age" required>
            </div>
            <div class="form-group">
                <label for="experience">Experiência com Minecraft:</label>
                <textarea id="experience" name="experience" required></textarea>
            </div>
            <div class="form-group">
                <label for="why">Por que você quer ser administrador?</label>
                <textarea id="why" name="why" required></textarea>
            </div>
            <div class="form-group">
                <label for="suggestions">Sugestões para o servidor:</label>
                <textarea id="suggestions" name="suggestions"></textarea>
            </div>
            <button type="submit" class="btn">Enviar Candidatura</button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inicializar AOS (Animações)
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>
</body>
</html>
